spring:
  # DataSource / Flyway の接続情報は Testcontainers の @ServiceConnection が実行時に注入する
  # （AbstractIntegrationTest 参照）。本番 .env や共有 DB には依存しない。
  datasource:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

server:
  port: 8080

app:
  jwt:
    secret: test-secret-key-that-is-at-least-32-characters-long-for-hmac
    issuer: fridge-app
    audience: fridge-app-web
    access-token-expiry: PT30M
    refresh-token-expiry: P14D
  google:
    client-id: test-google-client-id
  cookie:
    secure: false
  cors:
    allowed-origins: http://localhost:5173
  storage:
    type: local
    local-path: ${java.io.tmpdir}/fridgeapp-test-storage
